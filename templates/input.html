<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEO-CINEMA: Tambah Film</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend+Mega:wght@400;900&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Space Grotesk", sans-serif;
        background-color: #fffeef;
        background-image: radial-gradient(#00000015 1px, transparent 1px);
        background-size: 30px 30px;
      }
      h1,
      h2,
      h3,
      .brutalist-font {
        font-family: "Lexend Mega", sans-serif;
      }
      .brutalist-border {
        border: 3px solid #000000;
      }
      @media (min-width: 768px) {
        .brutalist-border {
          border: 4px solid #000000;
        }
      }
      .brutalist-shadow {
        box-shadow: 4px 4px 0px 0px #000000;
      }
      @media (min-width: 768px) {
        .brutalist-shadow {
          box-shadow: 8px 8px 0px 0px #000000;
        }
      }
      .brutalist-shadow-sm {
        box-shadow: 3px 3px 0px 0px #000000;
      }
      .brutalist-btn-active:active {
        transform: translate(2px, 2px);
        box-shadow: 0px 0px 0px 0px #000000;
      }
    </style>
  </head>
  <body
    class="p-4 md:p-8 min-h-screen flex flex-col items-center justify-center"
  >
    <div class="max-w-2xl w-full">
      <header
        class="brutalist-border bg-[#FFDE4D] p-3 md:p-4 mb-8 brutalist-shadow relative overflow-hidden flex justify-between items-center"
      >
        <div>
          <h1
            class="text-xl md:text-3xl font-black uppercase leading-none tracking-tighter mb-1"
          >
            <a href="/">NEO-CINEMA</a>
          </h1>
          <p
            class="text-[10px] md:text-xs font-bold border-t-2 border-black pt-1 inline-block"
          >
            TAMBAH DATA FILM
          </p>
        </div>
        <a
          href="/"
          class="bg-white brutalist-border p-2 px-4 font-black brutalist-shadow-sm brutalist-btn-active uppercase text-xs md:text-sm"
          >KEMBALI</a
        >
      </header>

      <form
        id="add-movie-form"
        class="brutalist-border bg-white p-6 md:p-8 brutalist-shadow flex flex-col gap-6"
      >
        <h2
          class="text-2xl font-black uppercase mb-2 border-b-4 border-black pb-2"
        >
          Input Film Baru
        </h2>

        <div class="flex flex-col gap-2">
          <label for="nama" class="font-black uppercase text-lg"
            >Judul Film:</label
          >
          <input
            type="text"
            id="nama"
            required
            placeholder="Contoh: Interstellar"
            class="brutalist-border p-3 text-lg font-bold focus:outline-none focus:bg-[#E6FF54] transition-colors"
          />
        </div>

        <div class="flex flex-col gap-2">
          <label for="streamUrl" class="font-black uppercase text-lg"
            >URL Streaming (Embed):</label
          >
          <input
            type="url"
            id="streamUrl"
            required
            placeholder="Contoh: https://streamimdb.ru/embed/movie/..."
            class="brutalist-border p-3 text-lg font-bold focus:outline-none focus:bg-[#E6FF54] transition-colors"
          />
        </div>

        <div class="flex flex-col gap-2">
          <label for="thumbnail" class="font-black uppercase text-lg"
            >URL Thumbnail (Gambar):</label
          >
          <input
            type="url"
            id="thumbnail"
            required
            placeholder="Contoh: https://m.media-amazon.com/images/M/..."
            class="brutalist-border p-3 text-lg font-bold focus:outline-none focus:bg-[#E6FF54] transition-colors"
          />
        </div>

        <button
          type="submit"
          id="submit-btn"
          class="bg-[#6BEB34] brutalist-border p-4 text-xl font-black uppercase brutalist-shadow-sm brutalist-btn-active hover:bg-black hover:text-white transition-colors mt-4"
        >
          SIMPAN KE DATABASE
        </button>

        <div
          id="status-message"
          class="hidden text-center font-black uppercase text-lg p-3 brutalist-border mt-2"
        ></div>
      </form>
    </div>

    <script>
      document
        .getElementById("add-movie-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const btn = document.getElementById("submit-btn");
          const statusMsg = document.getElementById("status-message");

          btn.innerText = "MENYIMPAN...";
          btn.disabled = true;
          statusMsg.classList.add("hidden");

          const payload = {
            nama: document.getElementById("nama").value,
            streamUrl: document.getElementById("streamUrl").value,
            thumbnail: document.getElementById("thumbnail").value,
          };

          try {
            const response = await fetch("/api/movies", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            if (!response.ok) throw new Error("Gagal menyimpan ke database");

            sessionStorage.removeItem("movies_cache");
            sessionStorage.removeItem("movies_cache_time");

            statusMsg.innerText = "FILM BERHASIL DITAMBAHKAN!";
            statusMsg.className =
              "text-center font-black uppercase text-lg p-3 brutalist-border mt-2 bg-[#6BEB34] text-black block";
            document.getElementById("add-movie-form").reset();
          } catch (error) {
            console.error(error);
            statusMsg.innerText = "GAGAL MENYIMPAN! CEK KONEKSI/RLS";
            statusMsg.className =
              "text-center font-black uppercase text-lg p-3 brutalist-border mt-2 bg-[#FF5A5F] text-white block";
          } finally {
            btn.innerText = "SIMPAN KE DATABASE";
            btn.disabled = false;
          }
        });
    </script>
  </body>
</html>
