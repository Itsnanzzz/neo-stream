<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>NEO-CINEMA: Nonton Film Streaming Online Tanpa Iklan Terbaru 2026</title>
    <meta name="description" content="Nonton film streaming kualitas HD di NEO-CINEMA. Pengalaman menonton film terbaru tanpa iklan yang mengganggu. Akses cepat, aman, dan gratis. Cek koleksi film kami sekarang!">
    <meta name="keywords" content="streaming film, nonton film tanpa iklan, neo-cinema, film hd online, bioskop online gratis">
    <link rel="canonical" href="https://neo-stream-me.vercel.app/" />
    <meta name="robots" content="index, follow">

    <meta property="og:title" content="NEO-CINEMA: Streaming Film Tanpa Iklan">
    <meta property="og:description" content="Tempat nonton film streaming kualitas HD tanpa iklan. Update film terbaru setiap hari!">
    <meta property="og:image" content="https://img.icons8.com/fluency/48/movie-projector.png">
    <meta property="og:url" content="https://neo-stream-me.vercel.app/">
    <meta property="og:type" content="website">

    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/movie-projector.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Mega:wght@400;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #FFFEEF; /* Cream background */
            background-image: radial-gradient(#00000015 1px, transparent 1px);
            background-size: 30px 30px;
        }
        h1, h2, h3, .brutalist-font {
            font-family: 'Lexend Mega', sans-serif;
        }
        .brutalist-border {
            border: 3px solid #000000;
        }
        @media (min-width: 768px) {
            .brutalist-border { border: 4px solid #000000; }
        }
        .brutalist-shadow {
            box-shadow: 4px 4px 0px 0px #000000;
        }
        @media (min-width: 768px) {
            .brutalist-shadow { box-shadow: 8px 8px 0px 0px #000000; }
        }
        .brutalist-shadow-sm {
            box-shadow: 3px 3px 0px 0px #000000;
        }
        .brutalist-card-hover:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px #000000;
        }
        @media (min-width: 768px) {
            .brutalist-card-hover:hover {
                transform: translate(-4px, -4px);
                box-shadow: 12px 12px 0px 0px #000000;
            }
        }
        .brutalist-btn-active:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px #000000;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #FF5A5F; border: 3px solid #000; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Sticky Wrapper for Header and Search -->
        <div class="sticky top-0 z-50 bg-[#FFFEEF] pt-2 pb-4">
            <!-- Header Section -->
            <header class="brutalist-border bg-[#FFDE4D] p-3 md:p-4 mb-4 brutalist-shadow relative overflow-hidden">
                <div class="absolute top-0 right-0 p-2 bg-black text-white text-[8px] font-black uppercase tracking-widest">v1.0 Edition</div>
                <h1 class="text-2xl md:text-5xl font-black uppercase leading-none tracking-tighter mb-1">NEO-CINEMA</h1>
                <p class="text-[10px] md:text-sm font-bold border-t-2 border-black pt-1 inline-block">AD-FREE STREAMING PLATFORM</p>
            </header>

            <!-- Search Section -->
            <section class="grid grid-cols-1 md:grid-cols-4 gap-2">
                <div class="md:col-span-3">
                    <input type="text" id="search-input" oninput="filterMovies()" placeholder="CARI JUDUL FILM..." 
                        class="w-full brutalist-border p-2 md:p-3 text-sm md:text-lg font-bold brutalist-shadow focus:outline-none focus:bg-[#E6FF54] transition-colors placeholder-black/30">
                </div>
                <div>
                    <select id="sort-select" onchange="filterMovies()" class="w-full brutalist-border p-2 md:p-3 text-sm md:text-lg font-bold brutalist-shadow focus:outline-none bg-white">
                        <option value="az">A-Z</option>
                        <option value="za">Z-A</option>
                    </select>
                </div>
            </section>
        </div>





        <!-- Headline Most Watched -->
        <div class="flex items-center gap-4 mb-8">
            <h2 class="text-3xl md:text-4xl font-black uppercase bg-[#FFDE4D] p-2 brutalist-border brutalist-shadow-sm">MAU NONTON APA HARI INI? 🍿</h2>
            <div class="flex-grow border-b-4 border-black border-dashed"></div>
        </div>

        <!-- Movie Grid -->
        <main id="movie-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-8">
            <!-- Movie cards will be injected here -->
            <div class="flex justify-center items-center py-20 col-span-full">
                <p class="text-2xl font-black animate-pulse uppercase">Memuat Database Film...</p>
            </div>
        </main>

        <!-- Footer -->
        <footer class="mt-20 border-t-8 border-black pt-8 pb-12 flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="font-black text-xl uppercase tracking-widest">© 2026 Itsnanzzz..</p>
            <div class="flex flex-wrap justify-center gap-4">
                <a href="https://saweria.co/Itsnanzzz" target="_blank" class="bg-[#FFDE4D] text-black px-4 py-2 brutalist-border brutalist-shadow-sm font-bold uppercase hover:bg-[#6BEB34] transition-colors">Donate</a>
                <a href="mailto:itsnanzzz.app@gmail.com?subject=Request Film" class="bg-[#3F00FF] text-white px-4 py-2 brutalist-border brutalist-shadow-sm font-bold uppercase hover:bg-white hover:text-black transition-colors">Request Film</a>
            </div>
        </footer>
    </div>

    <!-- Message Toast -->
    <div id="toast" class="fixed bottom-8 left-8 bg-[#6BEB34] brutalist-border p-4 font-black brutalist-shadow hidden z-50">
        DATA BERHASIL DIMUAT!
    </div>

    <!-- Welcome Popup -->
    <div id="welcome-popup" class="fixed inset-0 flex items-center justify-center z-[100] hidden bg-black/80 backdrop-blur-sm p-4">
        <div class="brutalist-border bg-[#FFDE4D] p-6 md:p-10 max-w-lg w-full brutalist-shadow relative text-center">
            <h3 class="text-3xl md:text-4xl font-black uppercase mb-4 border-b-4 border-black pb-2">PENGUMUMAN</h3>
            <div class="font-bold text-lg md:text-xl space-y-4 mb-8">
                <!-- Silakan ubah teks pesan di bawah ini -->
                <p>Perhatian!!Jika Data Film Tidak Muncul Silahkan Hubungi Admin !!</p>
                <p>Instagram: @Itsnanzzz1</p>
            </div>
            <button onclick="closeWelcomePopup()" class="w-full bg-black text-white brutalist-border p-4 font-black brutalist-shadow-sm brutalist-btn-active uppercase text-xl hover:bg-[#FF5A5F] transition-colors">SAYA MENGERTI</button>
        </div>
    </div>

    <script src="../lib/api.js"></script>
    <script>
        let movies = [];

        async function loadMovies() {
    try {
        movies = await fetchMoviesData();

        if (movies.length === 0) {
            document.getElementById('movie-grid').innerHTML = `
                <div class="col-span-full text-center p-12 brutalist-border bg-white brutalist-shadow">
                    <p class="text-2xl font-black uppercase">
                        DATABASE KOSONG
                    </p>
                </div>
            `;
            return;
        }

        filterMovies(); // Memanggil filter agar urutan langsung diterapkan
        showToast(`${movies.length} FILM BERHASIL DIMUAT!`);

    } catch (error) {
        console.error(error);

        document.getElementById('movie-grid').innerHTML = `
            <div class="col-span-full text-center p-12 brutalist-border bg-[#FF5A5F] text-white brutalist-shadow">
                <p class="text-2xl font-black uppercase">
                    KONEKSI GAGAL!
                </p>
                <p class="font-bold mt-2">
                    CEK SUPABASE URL & KEY
                </p>
            </div>
        `;
    }
}

        function renderMovies(data) {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = '';

            if (data.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center p-10 brutalist-border bg-white brutalist-shadow">
                        <p class="font-black text-2xl uppercase mb-4">Film tidak ditemukan!</p>
                        <a href="mailto:itsnanzzz.app@gmail.com?subject=Request Film - Platform NEO-CINEMA" class="bg-[#FF5A5F] text-white px-6 py-3 brutalist-border brutalist-shadow-sm font-black uppercase inline-block brutalist-btn-active">Request Film</a>
                    </div>
                `;
                return;
            }

            data.forEach((movie, index) => {
                const card = document.createElement('div');
                card.className = 'brutalist-border bg-white brutalist-shadow brutalist-card-hover transition-all flex flex-col group';
                
                // Variasi warna background untuk tiap kartu agar lebih Brutalist
                const colors = ['bg-[#FF5A5F]', 'bg-[#6BEB34]', 'bg-[#3F00FF]', 'bg-[#FFDE4D]', 'bg-[#E6FF54]'];
                const accentColor = colors[index % colors.length];

                card.innerHTML = `
                    <div class="relative aspect-video border-b-4 border-black overflow-hidden bg-black">
                        <img src="${movie.thumbnail}" alt="${movie.nama}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500">
                        <div class="absolute top-2 left-2 bg-white text-black text-[10px] font-black px-2 brutalist-border brutalist-shadow-sm">HD QUALITY</div>
                    </div>
                    <div class="p-5 flex-grow flex flex-col justify-between ${accentColor}">
                        <h3 class="text-2xl font-black uppercase leading-tight mb-4 line-clamp-2">${movie.nama}</h3>
                        <button onclick="playMovie('${movie.stream_url}', '${movie.nama.replace(/'/g, "\\'")}')" 
                            class="w-full bg-white brutalist-border py-3 px-4 font-black uppercase text-lg brutalist-shadow-sm brutalist-btn-active hover:bg-black hover:text-white transition-all">
                            PUTAR FILM ⚡
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterMovies() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const sort = document.getElementById('sort-select').value;

            // Filter berdasarkan pencarian
            let filtered = movies.filter(m => m.nama.toLowerCase().includes(query));

            // Logika Pengurutan
            if (sort === 'az') {
                filtered.sort((a, b) => a.nama.localeCompare(b.nama, 'id', { sensitivity: 'base' }));
            } else if (sort === 'za') {
                filtered.sort((a, b) => b.nama.localeCompare(a.nama, 'id', { sensitivity: 'base' }));
            }

            renderMovies(filtered);
        }

        function playMovie(url, title) {
            window.location.href = `/stream?url=${encodeURIComponent(url)}&title=${encodeURIComponent(title)}`;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function closeWelcomePopup() {
            document.getElementById('welcome-popup').classList.add('hidden');
        }

        // Jalankan saat halaman siap
        window.onload = () => {
            loadMovies();
            
            // Logika menampilkan popup hanya saat pertama kali dibuka
            if (!localStorage.getItem('neo_welcome_shown')) {
                document.getElementById('welcome-popup').classList.remove('hidden');
                localStorage.setItem('neo_welcome_shown', 'true');
            }
        };
    </script>
</body>
</html>
